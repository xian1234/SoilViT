# SoilViT default configuration
# All numeric constants that were previously hard-coded in train.py / LandVit.py
# are centralised here.  Override any value on the command line with --key value
# (see train.py --help).

# ---------------------------------------------------------------------------
# Data paths
# ---------------------------------------------------------------------------
data:
  train_json: "train_patch_data.json"
  val_json:   "val_patch_data.json"
  test_json:  "test_patch_data.json"
  # Band indices to select from the label raster (0-based).
  # Index 2 (theta_s, saturated water content) is excluded because it is
  # derived rather than directly measured in the Dai et al. 2019 archive.
  output_band_indices: [0, 1, 3, 4, 5, 6]

# ---------------------------------------------------------------------------
# Model architecture
# ---------------------------------------------------------------------------
model:
  img_size:      128   # spatial size of each patch (pixels)
  patch_size:    16    # ViT patch size
  in_chans:      13    # number of input spectral bands
  out_chans:     6     # number of predicted soil properties
  embed_dim:     768   # transformer embedding dimension
  depth:         12    # number of transformer encoder layers
  num_heads:     12    # number of attention heads
  dropout:       0.1   # dropout rate in transformer blocks
  geo_max_value: 90.0  # normalisation constant for lat/lon encoding

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
training:
  epochs:             50
  batch_size:         16
  val_batch_size:     1
  pretrained_weights: null   # path to a .pth checkpoint, or null
  save_path:          "best_model.pth"

# ---------------------------------------------------------------------------
# Optimiser  (AdamW)
# ---------------------------------------------------------------------------
optimizer:
  lr:           1.0e-4
  weight_decay: 1.0e-5

# ---------------------------------------------------------------------------
# LR scheduler  (CosineAnnealingLR)
# ---------------------------------------------------------------------------
scheduler:
  T_max: 50   # must match training.epochs for a single cosine cycle

# ---------------------------------------------------------------------------
# Loss function
# ---------------------------------------------------------------------------
loss:
  # Per-channel standard deviations used to build inverse-variance weights for
  # WeightedL1Loss.  These are derived from the training set only (see
  # spatial_data_split.py) and should be updated if the training data changes.
  weighted_l1_stds:
    - 0.1768311888563579
    - 0.025509036759667068
    - 0.11163705662290754
    - 0.07992872250899273
    - 0.08078752517773179
    - 0.17430399282526382
